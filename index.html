<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unread</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="body">
    <main>
    <section class="hero">
        <div class="container"> 
            <img src="menu.png" class="menu"/>
            <nav class="navigate">
                <div class="container-left">
                    <img src="https://unread.today/files/site_meta/b809740220f5b5b4749e697e42df987b.png" class="unread-logo"/>
                    <img src="Span.png" class="unread-span"/>
                    <input placeholder="Search"/>
                </div>

                <div class="container-right">
                    <h1 class="text1">Дараагийн нийтлэл:</h1>
                    <h2 class="text2">TECHWORM</h2>
                    <img src="Link [chip].png" class="button"/>
                </div>
            </nav>
        </div> 
        
        <div class="hero-content">
                <div class="image animation-zoom" style="background-image: url('figure-image.png');"></div>
                <div>
                    <h3 class="blink">ӨНӨӨДӨР</h3>
                    <div class="hero-description">
                        <h1>Мэдүүштэй</h1>
                        <h2>СОНИНООС СОРЧИЛЪЁ: ТОО ЮУ? СҮЛД ҮҮ? /2024.10.14/</h2>
                        <div class="names">
                            <img src="human.png" class="human"/>
                            <div style="margin-top: 5px;">
                                <h4 class="name">Tushigt-Erdene</h4>
                                <h5 class="calendar">10 сарын 14, 2024, 2 мин</h5>

                            </div>
                        </div>
                    </div>
                </div>
        </div>
    </section>
    </main>

    <section class="frame">
        <div class="box">
            <div class="image animation-zoom" style="background-image: url('image1.png');"></div>
        </div>
    </section>

    <footer></footer>
</body>
</html>
